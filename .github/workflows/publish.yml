name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Test and build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install package
        run: uv sync --locked

      - name: Run engine tests
        run: |
          uv run python tests/test_session_waist.py
          uv run python tests/test_cli.py
          uv run python tests/test_user_config.py

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          package_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$RELEASE_TAG" != "v$package_version" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version v$package_version"
            exit 1
          fi

      - name: Build source and wheel distributions
        run: uv build

      - name: Validate distributions
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/respan-redteam/
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI with trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
